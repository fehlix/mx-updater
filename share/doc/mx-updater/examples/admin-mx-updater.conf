# MX Updater -- Admin Icon Set Configuration
#
# This example file is installed at:
#   /usr/share/doc/mx-updater/examples/admin-mx-updater.conf
#
# It allows an administrator to define a custom set of icons for the
# MX Updater system tray, replacing the built-in icon sets.
#
# LOCATIONS (checked in this order -- first valid file wins):
#
#   1. /usr/local/etc/mx-updater.conf   (higher priority)
#      Safe from package updates. Recommended for local customisation.
#
#   2. /etc/mx-updater.conf             (fallback)
#      System-wide. May be overwritten by a package upgrade.
#
# Copy this example to either location and adapt to your needs:
#   sudo cp /usr/share/doc/mx-updater/examples/admin-mx-updater.conf \
#           /usr/local/etc/mx-updater.conf
#
# Remove the file to revert to the built-in icon sets.
#
# -----------------------------------------------------------------------
# ICON SETS
#
# Up to 4 icon sets can be defined using the fixed key names:
#   icon_set_1_*  icon_set_2_*  icon_set_3_*  icon_set_4_*
#
# Each set requires all three of these keys:
#   icon_set_N_label      -- display name shown in the Preferences dialog
#   icon_set_N_path_some  -- icon shown when updates ARE available
#   icon_set_N_path_none  -- icon shown when NO updates are available
#
# The label is free text chosen by the admin -- it does not need to match
# any built-in name (wireframe, classic, pulse, etc.).
#
# Sets are displayed in the Preferences dialog in order (1 to 4).
# If only one set is defined it is shown for preview but cannot be deselected.
#
# -----------------------------------------------------------------------
# INVALID OR MISSING CONFIGURATION
#
# A set is silently skipped if any of the three required keys are missing
# or empty. Sets with all three keys present are loaded regardless of
# whether the icon files actually exist on disk.
#
# If the selected file cannot be parsed (corrupt, wrong format):
#   -> that file is skipped and the other location is tried.
#
# If neither location yields at least one valid set:
#   -> the built-in icon sets are used unchanged.
#
# If a user's previously saved icon choice is no longer valid
# (e.g. admin changed or removed this file):
#   -> the first available set is selected automatically and written
#     back to the user config, keeping the GUI, disk and systray in sync.
#
# -----------------------------------------------------------------------

[MX-Updater-Icons]

icon_set_1_label        = updates
icon_set_1_path_some    = /usr/local/share/icons/custom/updates.png
icon_set_1_path_none    = /usr/local/share/icons/custom/updated.png

icon_set_2_label        = risk done
icon_set_2_path_some    = /usr/local/share/icons/custom/risk.png
icon_set_2_path_none    = /usr/local/share/icons/custom/done.png

icon_set_3_label        = hey ok
icon_set_3_path_some    = /usr/local/share/icons/custom/hey.png
icon_set_3_path_none    = /usr/local/share/icons/custom/ok.png
